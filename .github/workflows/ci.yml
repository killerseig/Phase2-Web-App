name: CI

on:
  pull_request:
  push:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      # Ratchet this threshold downward as warnings are fixed.
      - name: Lint (warning baseline gate)
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test -- --run
